<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HydroNode</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --bg:        #080f0a;
    --surface:   #0e1a10;
    --border:    #1c2e1e;
    --green:     #3ddc6e;
    --green-dim: #1a4a28;
    --yellow:    #f5c842;
    --red:       #f05050;
    --text:      #d4e8d8;
    --muted:     #4a6b50;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 20px 16px 48px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 520px;
    margin: 0 auto 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--green-dim);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 1px;
  }
  .logo-sub {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .online-badge {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.3s;
  }
  .online-badge.online {
    color: var(--green);
    border-color: var(--green-dim);
    background: var(--green-dim);
  }
  .online-badge.offline {
    color: var(--red);
    border-color: rgba(240,80,80,0.2);
    background: rgba(240,80,80,0.08);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .conn-dot.online  { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .conn-dot.offline { background: var(--red);   box-shadow: 0 0 8px var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── TDS Hero ── */
  .hero {
    max-width: 520px;
    margin: 0 auto 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(61,220,110,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 0.62rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .hero-value {
    font-family: var(--mono);
    font-size: 5rem;
    font-weight: 500;
    color: var(--green);
    line-height: 1;
    margin-bottom: 4px;
    transition: color 0.4s;
  }
  .hero-unit {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .tds-verdict {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 1px;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    transition: all 0.4s;
  }
  .verdict-low  { background: rgba(245,200,66,0.1);  border: 1px solid rgba(245,200,66,0.3); color: var(--yellow); }
  .verdict-ok   { background: rgba(61,220,110,0.1);  border: 1px solid rgba(61,220,110,0.3); color: var(--green);  }
  .verdict-high { background: rgba(240,80,80,0.1);   border: 1px solid rgba(240,80,80,0.3);  color: var(--red);    }
  .hero-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 3px;
    overflow: hidden;
  }
  .hero-bar {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    transition: width 0.8s ease, background 0.4s;
  }
  .hero-range {
    display: flex;
    justify-content: space-between;
    margin-top: 7px;
    font-size: 0.6rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── Cards ── */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 520px;
    margin: 0 auto 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .card-label {
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .card-val {
    font-family: var(--mono);
    font-size: 0.95rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .dot-red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
  .dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .dot-muted  { background: var(--muted); }

  /* ── Sections ── */
  .section {
    max-width: 520px;
    margin: 0 auto 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .section-title {
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── Mode buttons ── */
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .mode-btn {
    padding: 11px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .mode-btn:hover { border-color: var(--green); color: var(--text); }
  .mode-btn.active-auto { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .mode-btn.active-on   { background: rgba(61,220,110,0.15); border-color: var(--green); color: var(--green); }
  .mode-btn.active-off  { background: rgba(240,80,80,0.08); border-color: var(--red); color: var(--red); }

  /* ── Timer ── */
  .timer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .timer-field label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .timer-field input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .timer-field input:focus { border-color: var(--green); }
  .btn-save {
    width: 100%;
    padding: 11px;
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 8px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 0.75rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.15s;
  }
  .btn-save:hover { background: rgba(61,220,110,0.2); }

  /* ── Status bar ── */
  .statusbar {
    max-width: 520px;
    margin: 16px auto 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.62rem;
    color: var(--muted);
    font-family: var(--mono);
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 10px 20px;
    border-radius: 8px;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Offline overlay ── */
  .offline-banner {
    display: none;
    max-width: 520px;
    margin: 0 auto 14px;
    background: rgba(240,80,80,0.08);
    border: 1px solid rgba(240,80,80,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--red);
    text-align: center;
  }
  .offline-banner.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div>
      <div class="logo-text">HydroNode</div>
      <div class="logo-sub">Irrigation Controller</div>
    </div>
  </div>
  <div class="header-right">
    <span class="online-badge" id="onlineBadge">OFFLINE</span>
    <div class="conn-dot" id="connDot"></div>
  </div>
</header>

<div class="offline-banner" id="offlineBanner">
  ⚠ ESP32 not responding — last data may be stale
</div>

<!-- TDS Hero -->
<div class="hero">
  <div class="hero-eyebrow">Nutrient Concentration</div>
  <div class="hero-value" id="tdsVal">---</div>
  <div class="hero-unit">PPM</div>
  <div class="tds-verdict verdict-ok" id="tdsVerdict">Waiting...</div>
  <div class="hero-bar-wrap">
    <div class="hero-bar" id="tdsBar" style="width:0%"></div>
  </div>
  <div class="hero-range">
    <span>0</span>
    <span>Ideal 600 – 1200</span>
    <span>2000</span>
  </div>
</div>

<!-- Status cards -->
<div class="cards">
  <div class="card">
    <div class="card-label">Water Level</div>
    <div class="card-val" id="waterVal">
      <div class="dot dot-muted"></div>--
    </div>
  </div>
  <div class="card">
    <div class="card-label">Pump</div>
    <div class="card-val" id="pumpVal">
      <div class="dot dot-muted"></div>--
    </div>
  </div>
  <div class="card" style="grid-column:span 2">
    <div class="card-label">Status</div>
    <div class="card-val" id="statusVal" style="font-size:0.82rem; color:var(--muted)">--</div>
  </div>
</div>

<!-- Pump Mode -->
<div class="section">
  <div class="section-title">Pump Mode</div>
  <div class="mode-grid">
    <button class="mode-btn" id="btnAuto" onclick="setMode('AUTO')">⏱ AUTO</button>
    <button class="mode-btn" id="btnOn"   onclick="setMode('ON')">▶ ON</button>
    <button class="mode-btn" id="btnOff"  onclick="setMode('OFF')">■ OFF</button>
  </div>
</div>

<!-- Timer Settings -->
<div class="section">
  <div class="section-title">Timer Settings</div>
  <div class="timer-grid">
    <div class="timer-field">
      <label>ON — seconds</label>
      <input type="number" id="onSec" min="1" max="3600" value="15">
    </div>
    <div class="timer-field">
      <label>OFF — seconds</label>
      <input type="number" id="offSec" min="1" max="3600" value="60">
    </div>
  </div>
  <button class="btn-save" onclick="saveTimer()">SAVE TIMER</button>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span id="statusMsg">Connecting...</span>
  <span id="lastUpdate">--:--:--</span>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Replace with your Render URL ──────────────────────────
  const BASE_URL = window.location.origin;

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor  = isError ? 'var(--red)'   : 'var(--green)';
    t.style.color        = isError ? 'var(--red)'   : 'var(--green)';
    t.style.background   = isError ? 'rgba(240,80,80,0.08)' : 'var(--green-dim)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function updateModeButtons(mode) {
    document.getElementById('btnAuto').className = 'mode-btn' + (mode === 'AUTO' ? ' active-auto' : '');
    document.getElementById('btnOn').className   = 'mode-btn' + (mode === 'ON'   ? ' active-on'   : '');
    document.getElementById('btnOff').className  = 'mode-btn' + (mode === 'OFF'  ? ' active-off'  : '');
  }

  async function fetchData() {
    try {
      const r = await fetch(`${BASE_URL}/api/data`);
      const d = await r.json();

      // Online state
      const online = d.online;
      document.getElementById('connDot').className    = 'conn-dot ' + (online ? 'online' : 'offline');
      document.getElementById('onlineBadge').textContent = online ? 'ONLINE' : 'OFFLINE';
      document.getElementById('onlineBadge').className   = 'online-badge ' + (online ? 'online' : 'offline');
      document.getElementById('offlineBanner').className = 'offline-banner' + (online ? '' : ' show');

      // TDS
      const ppm = Math.round(d.tds);
      document.getElementById('tdsVal').textContent = ppm;
      const pct = Math.min(100, (ppm / 2000) * 100);
      document.getElementById('tdsBar').style.width = pct + '%';

      let tdsColor, verdictClass, verdictText;
      if (ppm < 600) {
        tdsColor = 'var(--yellow)'; verdictClass = 'tds-verdict verdict-low';
        verdictText = ppm < 100 ? 'No nutrients detected' : 'Low — add nutrients';
      } else if (ppm <= 1200) {
        tdsColor = 'var(--green)'; verdictClass = 'tds-verdict verdict-ok';
        verdictText = 'Optimal range ✓';
      } else {
        tdsColor = 'var(--red)'; verdictClass = 'tds-verdict verdict-high';
        verdictText = 'High — dilute solution';
      }
      document.getElementById('tdsVal').style.color     = tdsColor;
      document.getElementById('tdsVerdict').className   = verdictClass;
      document.getElementById('tdsVerdict').textContent = verdictText;
      document.getElementById('tdsBar').style.background =
        `linear-gradient(90deg, var(--green-dim), ${tdsColor})`;

      // Water level
      document.getElementById('waterVal').innerHTML = d.waterLow
        ? '<div class="dot dot-yellow"></div><span style="color:var(--yellow)">LOW</span>'
        : '<div class="dot dot-green"></div><span style="color:var(--green)">OK</span>';

      // Pump
      document.getElementById('pumpVal').innerHTML = d.pump
        ? '<div class="dot dot-green"></div><span style="color:var(--green)">RUNNING</span>'
        : '<div class="dot dot-muted"></div><span style="color:var(--muted)">IDLE</span>';

      // Status
      document.getElementById('statusVal').textContent = d.status;
      document.getElementById('statusMsg').textContent = d.status;
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

      // Sync timer inputs on first load
      if (d.onSec && document.getElementById('onSec').dataset.set !== '1') {
        document.getElementById('onSec').value  = d.onSec;
        document.getElementById('offSec').value = d.offSec;
        document.getElementById('onSec').dataset.set = '1';
      }

      updateModeButtons(d.mode);

    } catch(e) {
      document.getElementById('statusMsg').textContent = 'Server unreachable';
      document.getElementById('connDot').className = 'conn-dot offline';
    }
  }

  async function setMode(mode) {
    try {
      await fetch(`${BASE_URL}/api/mode`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode })
      });
      updateModeButtons(mode);
      showToast('Mode set: ' + mode);
    } catch(e) {
      showToast('Failed to set mode', true);
    }
  }

  async function saveTimer() {
    const onSec  = parseInt(document.getElementById('onSec').value);
    const offSec = parseInt(document.getElementById('offSec').value);
    if (onSec < 1 || offSec < 1 || isNaN(onSec) || isNaN(offSec)) {
      showToast('Enter valid seconds', true); return;
    }
    try {
      await fetch(`${BASE_URL}/api/timer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ onSec, offSec })
      });
      showToast('Timer saved');
    } catch(e) {
      showToast('Failed to save timer', true);
    }
  }

  fetchData();
  setInterval(fetchData, 2000);
</script>
</body>
</html>
